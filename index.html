<script>
(function() {
  const toggleBtn = document.getElementById('cheatToggleBtn');
  const panel = document.getElementById('cheatPanel');
  const select = document.getElementById('cheatMarbleSelect');
  const boostBtn = document.getElementById('cheatBoost');
  const sabotageBtn = document.getElementById('cheatSabotage');
  const stopBtn = document.getElementById('cheatStop');
  const statusDiv = document.getElementById('cheatStatus');
  const powerSlider = document.getElementById('cheatPower');
  const powerVal = document.getElementById('cheatPowerVal');

  let cheatInterval = null;
  let cheatMode = null; // 'boost' or 'sabotage'
  let targetMarbleId = null;
  let gameStartTime = 0;
  let vKeyHeld = false;

  const realStartBtn = document.querySelector('#btnStart');
  if (realStartBtn) {
    realStartBtn.addEventListener('click', () => {
      gameStartTime = Date.now();
    });
  }

  toggleBtn.addEventListener('click', () => {
    panel.classList.toggle('show');
    if (panel.classList.contains('show')) refreshMarbleList();
  });

  const shopBtn = document.getElementById('btnShop');
  if (shopBtn) {
    shopBtn.addEventListener('click', (e) => {
      e.preventDefault();
      panel.classList.toggle('show');
      if (panel.classList.contains('show')) refreshMarbleList();
    });
  }

  powerSlider.addEventListener('input', () => {
    powerVal.textContent = powerSlider.value;
  });

  function refreshMarbleList() {
    select.innerHTML = '<option value="">-- 구슬 선택 --</option>';
    if (!window.roulette || !window.roulette._marbles) return;
    const marbles = window.roulette._marbles;
    if (marbles.length === 0) {
      select.innerHTML = '<option value="">-- 게임 시작 후 선택 --</option>';
      return;
    }
    const sorted = [...marbles].sort((a, b) => b.y - a.y);
    sorted.forEach((m, idx) => {
      const opt = document.createElement('option');
      opt.value = m.id;
      opt.textContent = `#${idx + 1} ${m.name}`;
      opt.style.color = m.color;
      select.appendChild(opt);
    });
  }

  setInterval(() => {
    if (panel.classList.contains('show')) {
      const currentVal = select.value;
      refreshMarbleList();
      if (currentVal) select.value = currentVal;
      updateStatusText();
    }
  }, 1000);

  function getTargetBody() {
    if (targetMarbleId === null) return null;
    if (!window.roulette || !window.roulette.physics) return null;
    return window.roulette.physics.marbleMap[targetMarbleId] || null;
  }

  function setGravityScale(body, scale) {
    if (body && typeof body.SetGravityScale === 'function') {
      body.SetGravityScale(scale);
    }
  }

  function resetPhysics(body) {
    if (!body) return;
    setGravityScale(body, 1.0);
  }

  // 대상을 제외한 나머지 모든 구슬의 중력을 조작
  function setOtherMarblesGravity(scale) {
    if (!window.roulette || !window.roulette.physics) return;
    const map = window.roulette.physics.marbleMap;
    for (const id in map) {
      if (parseInt(id) === targetMarbleId) continue;
      setGravityScale(map[id], scale);
    }
  }

  // 나머지 모든 구슬의 중력을 정상으로 복원
  function resetOtherMarblesGravity() {
    setOtherMarblesGravity(1.0);
  }

  document.addEventListener('keydown', (e) => {
    if (e.repeat) return;
    if (!cheatMode || targetMarbleId === null) return;

    if (e.key === 'v' || e.key === 'V') {
      vKeyHeld = true;
      const body = getTargetBody();
      if (!body) return;

      const power = parseInt(powerSlider.value);

      if (cheatMode === 'boost') {
        // 대상: 강한 중력 부스트 (파워 1~20 → 중력 1.15~4.0)
        const gravScale = 1.0 + (power / 20) * 3.0;
        setGravityScale(body, gravScale);
        // 나머지: 중력 감소 → 느리게 낙하 (파워 1~20 → 중력 0.97~0.4)
        const othersGrav = 1.0 - (power / 20) * 0.6;
        setOtherMarblesGravity(othersGrav);
      } else if (cheatMode === 'sabotage') {
        // 대상: 중력 감소 → 체공시간 증가 (파워 1~20 → 중력 0.96~0.15)
        const gravScale = 1.0 - (power / 20) * 0.85;
        setGravityScale(body, gravScale);
        // 나머지: 중력 증가 → 빠르게 낙하 (파워 1~20 → 중력 1.05~2.5)
        const othersGrav = 1.0 + (power / 20) * 1.5;
        setOtherMarblesGravity(othersGrav);
      }
      updateStatusText();
    }

    if (e.key === 'c' || e.key === 'C') {
      triggerSkill();
    }
  });

  document.addEventListener('keyup', (e) => {
    if (e.key === 'v' || e.key === 'V') {
      vKeyHeld = false;
      const body = getTargetBody();
      if (!body) return;

      if (cheatMode === 'boost') {
        // V키 떼면 자동 부스트 레벨로 복귀 (파워 1~20 → 중력 1.05~2.0)
        const power = parseInt(powerSlider.value);
        const autoGravScale = 1.0 + (power / 20) * 1.0;
        setGravityScale(body, autoGravScale);
      } else {
        resetPhysics(body);
      }
      // V키 떼면 나머지 구슬은 정상으로 복원
      resetOtherMarblesGravity();
      updateStatusText();
    }
  });

  function triggerSkill() {
    if (targetMarbleId === null) return;
    if (!window.roulette || !window.roulette.physics) return;
    
    const physics = window.roulette.physics;
    if (typeof physics.impact === 'function') {
      physics.impact(targetMarbleId);
      statusDiv.textContent = '💥 밀치기 스킬 발동!';
      statusDiv.classList.add('active');
      setTimeout(() => updateStatusText(), 800);
    }
  }

  function stopCheat() {
    if (cheatInterval) {
      clearInterval(cheatInterval);
      cheatInterval = null;
    }

    // 대상 구슬 물리 복원
    const body = getTargetBody();
    resetPhysics(body);
    // 나머지 구슬 물리도 전부 복원
    resetOtherMarblesGravity();

    cheatMode = null;
    targetMarbleId = null;
    vKeyHeld = false;
    boostBtn.classList.remove('active');
    sabotageBtn.classList.remove('active');
    statusDiv.textContent = '대기 중...';
    statusDiv.classList.remove('active');
  }

  function updateStatusText() {
    if (!cheatMode || targetMarbleId === null) return;
    const marbles = window.roulette._marbles;
    if (!marbles || marbles.length === 0) return;
    const sorted = [...marbles].sort((a, b) => b.y - a.y);
    const target = marbles.find(m => m.id == targetMarbleId);
    if (!target) {
      stopCheat();
      statusDiv.textContent = '대상 구슬이 사라졌습니다';
      return;
    }
    const rank = sorted.findIndex(m => m.id == targetMarbleId) + 1;
    const total = sorted.length;
    
    let modeText, keyHint;
    if (cheatMode === 'boost') {
      modeText = '🚀 부스트';
      keyHint = vKeyHeld ? ' [V 강화중]' : ' (자동)';
    } else {
      modeText = '🐢 방해';
      keyHint = vKeyHeld ? ' [V 감속중]' : ' (대기)';
    }
    statusDiv.textContent = `${modeText}${keyHint}: ${target.name} (${rank}/${total}위)`;
    statusDiv.classList.add('active');
  }

  function startCheat(mode) {
    stopCheat();
    const selectedId = select.value;
    if (!selectedId) {
      statusDiv.textContent = '⚠️ 먼저 구슬을 선택하세요!';
      return;
    }
    targetMarbleId = parseInt(selectedId);
    cheatMode = mode;

    if (mode === 'boost') {
      boostBtn.classList.add('active');
    } else {
      sabotageBtn.classList.add('active');
    }

    cheatInterval = setInterval(() => {
      const body = getTargetBody();
      if (!body) {
        stopCheat();
        statusDiv.textContent = '대상 구슬이 사라졌습니다';
        return;
      }

      if (gameStartTime === 0 || Date.now() - gameStartTime < 2000) {
        if (!statusDiv.textContent.includes('2초')) {
          statusDiv.textContent = `⏳ 대기 중 (${cheatMode === 'boost' ? '부스트' : '방해'} 작동 2초 전)`;
        }
        return;
      } else {
        if (statusDiv.textContent.includes('2초 전')) {
          updateStatusText();
        }
      }

      const power = parseInt(powerSlider.value);

      if (mode === 'boost' && !vKeyHeld) {
        // === 1등 모드 자동 부스트 (V키 미사용 시) ===
        // 중력 증가 항상 유지 (파워 1~20 → 중력 1.05~2.0)
        const autoGravScale = 1.0 + (power / 20) * 1.0;
        setGravityScale(body, autoGravScale);
      }

      if (mode === 'sabotage') {
        // === 꼴찌 모드: 나머지 공들 무겁게 (V키 무관, 항상) ===
        // 파워 1~20 → 중력 1.03~1.6
        const othersAutoGrav = 1.0 + (power / 20) * 0.6;
        setOtherMarblesGravity(othersAutoGrav);
      }

      // Sleep 방지
      if (typeof body.SetAwake === 'function') {
        body.SetAwake(true);
      }
    }, 100);

    updateStatusText();
  }

  boostBtn.addEventListener('click', () => startCheat('boost'));
  sabotageBtn.addEventListener('click', () => startCheat('sabotage'));
  stopBtn.addEventListener('click', stopCheat);

  // 게임이 끝나면 치트 자동 중지
  if (window.roulette) {
    window.roulette.addEventListener('goal', () => {
      gameStartTime = 0;
      setTimeout(stopCheat, 1000);
    });
  } else {
    // roulette이 아직 로드 안됐을 수 있으므로 대기
    const waitForRoulette = setInterval(() => {
      if (window.roulette) {
        clearInterval(waitForRoulette);
        window.roulette.addEventListener('goal', () => {
          gameStartTime = 0;
          setTimeout(stopCheat, 1000);
        });
      }
    }, 500);
  }
})();
</script>
